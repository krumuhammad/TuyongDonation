<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ยอดบริจาคแบบเรียลไทม์</title>
<link rel="stylesheet" href="./assets/style.css">
<style>
  body{overflow-x:hidden;}
  .stage{
    min-height:100vh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:40px 16px 0;
    position:relative;
  }
  .event-name{font-size:clamp(1.1rem,3vw,1.6rem);color:var(--gold-bright);margin:0 0 6px;}
  .eyebrow-lg{margin-bottom:2px;}

  /* Flip counter */
  .counter{
    display:flex;gap:6px;justify-content:center;flex-wrap:wrap;
    margin:22px 0 10px;
  }
  .digit-group{display:flex;gap:6px;}
  .digit{
    position:relative;
    width:clamp(38px,7vw,74px);
    height:clamp(56px,10.5vw,108px);
    background:linear-gradient(180deg,#1E2A56,#141C3E);
    border:1px solid var(--line);
    border-radius:10px;
    box-shadow: inset 0 2px 6px rgba(0,0,0,.4), 0 6px 18px rgba(0,0,0,.35);
    display:flex;align-items:center;justify-content:center;
    font-family:'Space Mono',monospace;
    font-size:clamp(1.6rem,5.5vw,3.4rem);
    color:var(--gold-bright);
    overflow:hidden;
  }
  .digit::after{
    content:"";position:absolute;left:0;right:0;top:50%;height:1px;
    background:rgba(0,0,0,.5);
  }
  .digit.flash{animation:flash .6s ease;}
  @keyframes flash{
    0%{box-shadow: inset 0 2px 6px rgba(0,0,0,.4), 0 0 0px var(--gold-bright);}
    30%{box-shadow: inset 0 2px 6px rgba(0,0,0,.4), 0 0 34px var(--gold-bright);}
    100%{box-shadow: inset 0 2px 6px rgba(0,0,0,.4), 0 6px 18px rgba(0,0,0,.35);}
  }
  .baht{font-family:'Kanit';font-size:clamp(1rem,2.6vw,1.4rem);color:var(--text-muted);margin-top:2px;}

  /* Goal bar */
  .goal-wrap{width:min(560px,86vw);margin:22px 0 6px;}
  .goal-labels{display:flex;justify-content:space-between;font-size:.82rem;color:var(--text-muted);margin-bottom:6px;}
  .goal-track{height:14px;border-radius:999px;background:#141C3E;border:1px solid var(--line);overflow:hidden;}
  .goal-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--gold),var(--gold-bright));transition:width .8s ease;}

  /* Ticker */
  .ticker-wrap{
    width:100%;border-top:1px solid var(--line);border-bottom:1px solid var(--line);
    background:rgba(14,20,40,.55);
    padding:12px 0;margin-top:auto;
    overflow:hidden;position:relative;
  }
  .ticker-track{display:flex;gap:48px;white-space:nowrap;animation:scroll 28s linear infinite;}
  .ticker-item{font-family:'Kanit';font-size:.98rem;color:var(--text-light);}
  .ticker-item b{color:var(--gold-bright);}
  @keyframes scroll{from{transform:translateX(0);}to{transform:translateX(-50%);}}
  @media (prefers-reduced-motion: reduce){
    .ticker-track{animation:none;}
    .digit.flash{animation:none;}
  }
  .footer-note{font-size:.75rem;color:var(--text-muted);padding:10px 0 18px;text-align:center;}
</style>
</head>
<body>

<div class="stage">
  <div class="motif-divider" style="position:absolute;top:0;left:0;right:0;"></div>
  <div class="eyebrow eyebrow-lg" id="eyebrow">ยอดบริจาคสะสม</div>
  <h1 class="event-name" id="eventName">กำลังโหลด…</h1>

  <div class="counter" id="counter"><!-- digits injected by JS --></div>
  <div class="baht">บาท</div>

  <div class="goal-wrap" id="goalWrap" style="display:none;">
    <div class="goal-labels">
      <span id="goalPct">0%</span>
      <span id="goalText">เป้าหมาย 0 บาท</span>
    </div>
    <div class="goal-track"><div class="goal-fill" id="goalFill" style="width:0%;"></div></div>
  </div>
</div>

<div class="ticker-wrap">
  <div class="ticker-track" id="tickerTrack">
    <div class="ticker-item">กำลังรอรายการบริจาค…</div>
  </div>
</div>
<div class="footer-note">อัปเดตอัตโนมัติแบบเรียลไทม์ • ระบบบันทึกยอดบริจาค</div>

<script type="module">
import { db, onSnapshot, collection, query, orderBy, limit, doc, getDoc, DEFAULT_CONFIG } from "./assets/firebase-init.js";

const counterEl = document.getElementById('counter');
const eventNameEl = document.getElementById('eventName');
const goalWrap = document.getElementById('goalWrap');
const goalFill = document.getElementById('goalFill');
const goalPct = document.getElementById('goalPct');
const goalText = document.getElementById('goalText');
const tickerTrack = document.getElementById('tickerTrack');

let currentTotal = 0;
let goal = 0;

function renderDigits(total){
  const str = Math.round(total).toLocaleString('en-US'); // e.g. 12,340
  const groups = str.split(',');
  counterEl.innerHTML = '';
  groups.forEach((g, gi) => {
    const groupEl = document.createElement('div');
    groupEl.className = 'digit-group';
    [...g].forEach(ch => {
      const d = document.createElement('div');
      d.className = 'digit';
      d.textContent = ch;
      groupEl.appendChild(d);
    });
    counterEl.appendChild(groupEl);
    if (gi < groups.length - 1){
      const comma = document.createElement('div');
      comma.style.display='flex';comma.style.alignItems='flex-end';
      comma.style.color='var(--text-muted)';comma.style.fontFamily="'Space Mono',monospace";
      comma.style.fontSize='clamp(1.6rem,5.5vw,3.4rem)';comma.style.padding='0 2px 6px';
      comma.textContent=',';
      counterEl.appendChild(comma);
    }
  });
}

function flashDigits(){
  document.querySelectorAll('.digit').forEach(d=>{
    d.classList.remove('flash');
    void d.offsetWidth; // restart animation
    d.classList.add('flash');
  });
}

function updateGoalUI(){
  if (!goal || goal <= 0){ goalWrap.style.display='none'; return; }
  goalWrap.style.display='block';
  const pct = Math.min(100, (currentTotal/goal)*100);
  goalFill.style.width = pct.toFixed(1)+'%';
  goalPct.textContent = pct.toFixed(1)+'%';
  goalText.textContent = 'เป้าหมาย ' + goal.toLocaleString('en-US') + ' บาท';
}

// --- Load config (event name + goal), fallback to defaults ---
(async () => {
  try{
    const snap = await getDoc(doc(db,'config','settings'));
    const cfg = snap.exists() ? snap.data() : DEFAULT_CONFIG;
    eventNameEl.textContent = cfg.eventName || DEFAULT_CONFIG.eventName;
    goal = Number(cfg.goal) || 0;
    updateGoalUI();
  }catch(e){
    eventNameEl.textContent = DEFAULT_CONFIG.eventName;
  }
})();

renderDigits(0);

// --- Live total + ticker from donations collection ---
const q = query(collection(db,'donations'), orderBy('createdAt','desc'), limit(30));
onSnapshot(q, (snap) => {
  let total = 0;
  const items = [];
  snap.forEach(d=>{
    const v = d.data();
    total += Number(v.amount)||0;
    items.push(v);
  });
  const changed = Math.round(total) !== Math.round(currentTotal);
  currentTotal = total;
  renderDigits(total);
  updateGoalUI();
  if (changed) flashDigits();

  if (items.length){
    const html = items.map(v =>
      `<div class="ticker-item">🙏 <b>${escapeHtml(v.name||'ไม่ระบุชื่อ')}</b> ร่วมบริจาค <b>${(Number(v.amount)||0).toLocaleString('en-US')}</b> บาท</div>`
    ).join('');
    tickerTrack.innerHTML = html + html; // duplicate for seamless loop
  }
}, (err)=>{
  eventNameEl.textContent = 'ยังไม่ได้เชื่อมต่อฐานข้อมูล (ตรวจสอบ firebase-config.js)';
});

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
</script>
</body>
</html>
